<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Random Number Generator</title>
  </head>

  <body>
    <div class="container">
      <div class="container__content">
        <div class="container__info">
          <div class="container__text">
            <h1>
              Random Number<span class="container__text-blue">Generator</span>
            </h1>

            <div class="container__field">
              <label class="text__paragraph">Quantity of numbers</label>
              <input
                class="container__input"
                id="quantity"
                type="number"
                min="1"
                placeholder="Ex: 5"
              />
            </div>

            <div class="container__field">
              <label class="text__paragraph">From number</label>
              <input
                class="container__input"
                id="min"
                type="number"
                min="1"
                oninput="updateLimits()"
                required
              />
            </div>

            <div class="container__field">
              <label class="text__paragraph">To number</label>
              <input
                class="container__input"
                id="max"
                type="number"
                min="1"
                required
              />
            </div>
          </div>

          <div class="container__field">
            <label class="text__paragraph">Allow duplicates?</label>
            <label class = "switch">
              <input
                type="checkbox"
                id="toggle-duplicates"/>
              <span class="slider"></spa>
            </label> 
          </div>

          <div class="controls container__buttons">
            <button
              onclick="generate()"
              id="btn-generate"
              class="container__button"
            >
              Generate
            </button>
            <button
              onclick="reset()"
              id="btn-reset"
              class="container__button"
              disabled
            >
              Reset
            </button>
          </div>

          <div class="container__text" id="result">
            <label class="text__paragraph"
              >Generated numbers: none so far</label
            >
          </div>
        </div>

        <img
          src="./img/ia.png"
          alt="Uma pessoa com capacete de astronauta"
          class="container__person-image"
        />
      </div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
